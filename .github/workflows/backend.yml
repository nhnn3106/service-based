name: Backend Deployment (DevOps Standard)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create dummy .env files
        run: |
          # Tạo các file .env trống để docker-compose build không bị lỗi (vì các file này thường bị gitignore)
          mkdir -p ./UserService ./foodserivce ./-KTPM-Lab07_ServiceBased ./payment-notification-service
          touch ./UserService/.env
          touch ./foodserivce/.env
          touch ./-KTPM-Lab07_ServiceBased/.env
          touch ./payment-notification-service/.env

      - name: Build and Push all Docker Images
        run: |
          # Dùng máy chủ mạnh của GitHub để Build và Đẩy lên Docker Hub
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          export EC2_PUBLIC_IP=dummy  # Tránh warning khi build
          docker compose build
          docker compose push

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}
            
            if [ ! -d "service-based" ]; then
              git clone https://github.com/nhnn3106/service-based.git
            fi
            
            cd service-based
            git pull origin main
            
            export EC2_PUBLIC_IP=${{ secrets.EC2_HOST }}
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            
            # Kéo nguyên bộ code đã đóng gói từ Docker Hub về và chạy (Không thèm Build nữa)
            docker compose pull
            docker compose up -d
            
            # Dọn dẹp các image cũ để tiết kiệm ổ cứng cho EC2
            docker image prune -f
