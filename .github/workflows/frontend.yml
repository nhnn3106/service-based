name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'Frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'Frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json
      - name: Install & Build
        working-directory: ./Frontend
        run: |
          npm ci
          npm run build
