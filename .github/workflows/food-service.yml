name: Food Service CI

on:
  push:
    branches: [main]
    paths:
      - 'foodserivce/**'
  pull_request:
    branches: [main]
    paths:
      - 'foodserivce/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
      - name: Build with Maven
        working-directory: ./foodserivce
        run: mvn clean package -DskipTests
