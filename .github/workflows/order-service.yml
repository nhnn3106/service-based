name: Order Service CI

on:
  push:
    branches: [main]
    paths:
      - '-KTPM-Lab07_ServiceBased/**'
  pull_request:
    branches: [main]
    paths:
      - '-KTPM-Lab07_ServiceBased/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: -KTPM-Lab07_ServiceBased/package-lock.json
      - name: Install & Build
        working-directory: ./-KTPM-Lab07_ServiceBased
        run: |
          npm ci
          npx prisma generate
          npm run build
