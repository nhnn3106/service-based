spring.application.name=payment-notification-service
server.port=${PORT:8084}

# External Order Service host.
order.service.host=${ORDER_HOST:localhost}
order.service.port=${ORDER_PORT:8083}

# PostgreSQL connection (converted from DATABASE_URL format).
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update